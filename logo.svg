<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c45d3e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c45d3e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>

  <!-- Outer ring — represents the data brokers' view -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="#f5f0e8" stroke-width="1.5" opacity="0.2"/>

  <!-- Data points on outer ring — the broker segments -->
  <circle cx="256" cy="101" r="3.5" fill="#c45d3e" opacity="0.7"/>
  <circle cx="365" cy="152" r="3" fill="#c49a3e" opacity="0.6"/>
  <circle cx="400" cy="270" r="3.5" fill="#c45d3e" opacity="0.5"/>
  <circle cx="350" cy="375" r="3" fill="#c49a3e" opacity="0.7"/>
  <circle cx="240" cy="410" r="3.5" fill="#c45d3e" opacity="0.6"/>
  <circle cx="130" cy="350" r="3" fill="#c49a3e" opacity="0.5"/>
  <circle cx="105" cy="230" r="3.5" fill="#c45d3e" opacity="0.7"/>
  <circle cx="160" cy="135" r="3" fill="#c49a3e" opacity="0.6"/>

  <!-- Middle ring — the attention layer -->
  <circle cx="256" cy="256" r="105" fill="none" stroke="#f5f0e8" stroke-width="1" opacity="0.35"/>

  <!-- Inner ring — your awareness boundary -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#f5f0e8" stroke-width="1.5" opacity="0.55"/>

  <!-- Center point — you -->
  <circle cx="256" cy="256" r="8" fill="#f5f0e8" opacity="0.9"/>

  <!-- Connecting lines from data points to center — the data flows -->
  <line x1="256" y1="101" x2="256" y2="248" stroke="#f5f0e8" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="270" x2="264" y2="256" stroke="#f5f0e8" stroke-width="0.5" opacity="0.08"/>
  <line x1="240" y1="410" x2="254" y2="264" stroke="#f5f0e8" stroke-width="0.5" opacity="0.08"/>
  <line x1="105" y1="230" x2="248" y2="254" stroke="#f5f0e8" stroke-width="0.5" opacity="0.08"/>

  <!-- The "mirror crack" — a subtle diagonal line suggesting the moment of seeing -->
  <line x1="200" y1="200" x2="312" y2="312" stroke="#4a7c6f" stroke-width="0.8" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="256" y="476" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="400" letter-spacing="6" fill="#f5f0e8" opacity="0.7">CLARITY</text>
</svg>
